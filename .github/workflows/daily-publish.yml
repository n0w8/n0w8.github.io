# Der "Roboter im Quellcode": veröffentlicht täglich 1 Artikel aus content/queue/ —
# läuft GRATIS auf GitHubs Servern, auch wenn der PC aus ist. Keine KI, keine API-Kosten.
name: Daily publish from queue

# Anti-Muster-Erkennung: DREI mögliche Zeitfenster + gelegentlicher Ruhetag.
# Ein deterministischer Tages-Hash wählt Slot bzw. Pause — kein exakt gleicher
# Veröffentlichungs-Rhythmus, wie ihn Google bei Automatisierung erkennt.
on:
  schedule:
    - cron: '7 4 * * *'  # Slot 0 (~06:07 Wien Sommer)
    - cron: '23 5 * * *' # Slot 1 (~07:23)
    - cron: '41 6 * * *' # Slot 2 (~08:41)
  workflow_dispatch: {} # manueller "Jetzt testen"-Knopf (überspringt nie)

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Nur der per Tages-Hash gewählte Slot veröffentlicht; ~1 Tag pro Woche Pause.
      # Manuelle Starts (workflow_dispatch) laufen immer durch.
      - name: Variance gate (slot pick + rest day)
        if: github.event_name == 'schedule'
        run: |
          D=$(date -u +%Y%m%d)
          H=$(date -u +%H)
          if [ $((10#$D % 6)) -eq 0 ]; then
            echo "SKIP=1" >> "$GITHUB_ENV"
            echo "Ruhetag — heute keine Veröffentlichung."
            exit 0
          fi
          case "$H" in
            04) S=0;; 05) S=1;; 06) S=2;; *) S=9;;
          esac
          if [ $((10#$D % 3)) -ne "$S" ]; then
            echo "SKIP=1" >> "$GITHUB_ENV"
            echo "Heute ist ein anderer Zeit-Slot dran."
          fi

      - name: Publish one article from queue
        if: env.SKIP != '1'
        run: node scripts/publish-from-queue.mjs

      - name: Commit & push
        if: env.SKIP != '1'
        run: |
          git config user.name "nordweg-publisher"
          git config user.email "publisher@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Queue leer — nichts zu veröffentlichen."
          else
            git commit -m "Auto-publish: daily article from queue"
            git push
          fi
