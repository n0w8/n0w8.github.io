# Der "Roboter im Quellcode": veröffentlicht täglich Artikel aus content/queue/ —
# läuft GRATIS auf GitHubs Servern, auch wenn der PC aus ist. Keine KI, keine API-Kosten.
name: Daily publish from queue

# Drei Startzeiten (natürliche Zeit-Streuung). Wie viele Artikel pro Tag live gehen,
# steuert postsPerDay in content/publish-config.json: jeder Slot veröffentlicht
# HÖCHSTENS 1 Artikel und überspringt, sobald das Tagesziel erreicht ist. Bei
# postsPerDay=2 postet Slot 1 (~06:07 Wien) und Slot 2 (~10:23); Slot 3 (~14:41)
# fängt verpasste Slots ab. Robust gegen GitHubs Cron-Verspätungen (der frühere Bug).
on:
  schedule:
    - cron: '7 4 * * *'  # früher Slot (~06:07 Wien Sommer)
    - cron: '23 8 * * *' # mittlerer Slot (~10:23)
    - cron: '41 12 * * *' # später Slot (~14:41) — fängt verspätete/übersprungene Tage ab
  workflow_dispatch: {} # manueller "Jetzt testen"-Knopf (überspringt nie)

concurrency:
  group: ftp-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Ruhetag + Tagesziel — beides aus content/publish-config.json gesteuert
      # (im Agentic OS sichtbar/änderbar). restDayWeekday: 0=So..6=Sa (UTC-Tag);
      # restDayEnabled:false => jeden Tag posten. Gezählt werden die heute
      # veröffentlichten DE-Artikel (1 pro Paar). KEINE Uhrzeit-Abhängigkeit.
      # Manuelle Starts (workflow_dispatch) laufen immer durch.
      - name: Publish gate (Ruhetag + Tagesziel)
        if: github.event_name == 'schedule'
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          DOW=$(date -u +%w)
          ENABLED=$(node -p "require('./content/publish-config.json').restDayEnabled" 2>/dev/null || echo false)
          RESTDOW=$(node -p "require('./content/publish-config.json').restDayWeekday" 2>/dev/null || echo -1)
          PERDAY=$(node -p "require('./content/publish-config.json').postsPerDay ?? 1" 2>/dev/null || echo 1)
          if [ "$ENABLED" = "true" ] && [ "$DOW" = "$RESTDOW" ]; then
            echo "SKIP=1" >> "$GITHUB_ENV"
            echo "Geplanter Ruhetag (Wochentag $DOW laut publish-config.json) — heute keine Veröffentlichung."
            exit 0
          fi
          COUNT=$(grep -rl "pubDate: $TODAY" src/content/blog/de 2>/dev/null | wc -l)
          if [ "$COUNT" -ge "$PERDAY" ]; then
            echo "SKIP=1" >> "$GITHUB_ENV"
            echo "Tagesziel erreicht ($COUNT von $PERDAY heute veröffentlicht) — überspringe."
          else
            echo "Heute $COUNT von $PERDAY veröffentlicht — dieser Slot postet Artikel $((COUNT + 1))."
          fi

      - name: Publish one article from queue
        if: env.SKIP != '1'
        run: node scripts/publish-from-queue.mjs

      - name: Commit & push
        if: env.SKIP != '1'
        run: |
          git config user.name "nordweg-publisher"
          git config user.email "publisher@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Queue leer — nichts zu veröffentlichen."
            echo "SKIP=1" >> "$GITHUB_ENV"
          else
            git commit -m "Auto-publish: daily article from queue"
            git push
          fi

      # WICHTIG: Ein Push mit dem Standard-GITHUB_TOKEN löst KEINE anderen Workflows aus
      # (GitHub-Schutz gegen Endlosschleifen). Deshalb deployt dieser Workflow selbst
      # per FTP, statt sich auf deploy-ftp.yml zu verlassen.
      - name: Install
        if: env.SKIP != '1'
        run: npm ci

      - name: Ensure native deps built
        if: env.SKIP != '1'
        run: npm rebuild sharp esbuild

      - name: Build
        if: env.SKIP != '1'
        run: npm run build

      - name: FTP sync to easyname
        if: env.SKIP != '1'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: e111595-ftp.services.easyname.eu
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: nordweg-blog/
