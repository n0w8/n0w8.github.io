# Der "Roboter im Quellcode": veröffentlicht täglich 1 Artikel aus content/queue/ —
# läuft GRATIS auf GitHubs Servern, auch wenn der PC aus ist. Keine KI, keine API-Kosten.
name: Daily publish from queue

on:
  schedule:
    - cron: '0 4 * * *' # ~06:00 Wien (Sommerzeit) / ~05:00 (Winterzeit)
  workflow_dispatch: {} # manueller "Jetzt testen"-Knopf im GitHub-Actions-Tab

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Publish one article from queue
        run: node scripts/publish-from-queue.mjs

      - name: Commit & push
        run: |
          git config user.name "nordweg-publisher"
          git config user.email "publisher@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Queue leer — nichts zu veröffentlichen."
          else
            git commit -m "Auto-publish: daily article from queue"
            git push
          fi
