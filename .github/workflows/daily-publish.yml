# Der "Roboter im Quellcode": veröffentlicht täglich 1 Artikel aus content/queue/ —
# läuft GRATIS auf GitHubs Servern, auch wenn der PC aus ist. Keine KI, keine API-Kosten.
name: Daily publish from queue

# Anti-Muster: drei mögliche Startzeiten (natürliche Zeit-Streuung) + ~1 Ruhetag/Woche.
# WICHTIG: Es wird HÖCHSTENS 1x pro Tag veröffentlicht — egal welcher Slot (auch verspätet)
# feuert. Der erste Lauf des Tages postet, spätere Läufe erkennen "heute schon erledigt"
# und überspringen. Robust gegen GitHubs Cron-Verspätungen (der frühere Bug).
on:
  schedule:
    - cron: '7 4 * * *'  # früher Slot (~06:07 Wien Sommer)
    - cron: '23 8 * * *' # mittlerer Slot (~10:23)
    - cron: '41 12 * * *' # später Slot (~14:41) — fängt verspätete/übersprungene Tage ab
  workflow_dispatch: {} # manueller "Jetzt testen"-Knopf (überspringt nie)

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Ruhetag (~1x/Woche) ODER heute schon veröffentlicht -> überspringen.
      # KEINE Uhrzeit-Abhängigkeit mehr -> unempfindlich gegen Cron-Verspätung.
      # Manuelle Starts (workflow_dispatch) laufen immer durch.
      - name: Variance gate (rest day + already-published guard)
        if: github.event_name == 'schedule'
        run: |
          D=$(date -u +%Y%m%d)
          TODAY=$(date -u +%Y-%m-%d)
          if [ $((10#$D % 6)) -eq 0 ]; then
            echo "SKIP=1" >> "$GITHUB_ENV"
            echo "Ruhetag — heute keine Veröffentlichung."
            exit 0
          fi
          if grep -rlq "pubDate: $TODAY" src/content/blog 2>/dev/null; then
            echo "SKIP=1" >> "$GITHUB_ENV"
            echo "Heute wurde bereits veröffentlicht — überspringe."
          fi

      - name: Publish one article from queue
        if: env.SKIP != '1'
        run: node scripts/publish-from-queue.mjs

      - name: Commit & push
        if: env.SKIP != '1'
        run: |
          git config user.name "nordweg-publisher"
          git config user.email "publisher@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Queue leer — nichts zu veröffentlichen."
          else
            git commit -m "Auto-publish: daily article from queue"
            git push
          fi
